<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRunner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --surface2: #f4f4f2;
    --text: #1a1a19;
    --text2: #5f5e5a;
    --text3: #b4b2a9;
    --accent: #d97706;
    --accent-hover: #b45309;
    --accent-subtle: rgba(217,119,6,0.08);
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.11);
    --node-bg: #f4f4f2;
    --node-border: rgba(0,0,0,0.09);
    --shadow: 0 1px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 6px 32px rgba(0,0,0,0.09);
    --radius: 10px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    --start-color: #1a1a19;
    --end-color: #3b6d11;
    --end-bg: #eaf3de;
    --end-border: #c0dd97;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #242422;
      --text: #f4f4f2;
      --text2: #888780;
      --text3: #5f5e5a;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --accent-subtle: rgba(245,158,11,0.1);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.11);
      --node-bg: #242422;
      --node-border: rgba(255,255,255,0.09);
      --shadow: 0 1px 12px rgba(0,0,0,0.35);
      --shadow-lg: 0 6px 32px rgba(0,0,0,0.5);
      --start-color: #f4f4f2;
      --end-color: #97c459;
      --end-bg: #1e2e10;
      --end-border: #3b6d11;
    }
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 20px 80px;
  }

  header {
    width: 100%;
    max-width: 720px;
    padding: 56px 0 36px;
    text-align: center;
  }

  .logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 15px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: -0.005em;
  }

  .card {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    margin-bottom: 16px;
  }

  .inputs-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 2px;
  }

  .input-field {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    font-size: 15px;
    font-family: var(--font);
    font-weight: 400;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
  }

  input[type="text"]::placeholder { color: var(--text3); }

  .arrow-divider {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 2px;
    color: var(--text3);
  }

  .arrow-divider svg {
    width: 20px;
    height: 20px;
    margin-top: 22px;
  }

  .btn-run {
    width: 100%;
    height: 50px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-family: var(--font);
    font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-run:hover { background: var(--accent-hover); }
  .btn-run:active { transform: scale(0.99); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-run .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-run.loading .spinner { display: block; }
  .btn-run.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }



  .error-msg {
    width: 100%;
    max-width: 720px;
    padding: 14px 20px;
    background: rgba(255, 59, 48, 0.08);
    border: 1px solid rgba(255, 59, 48, 0.2);
    border-radius: var(--radius);
    color: #ff3b30;
    font-size: 14px;
    display: none;
    margin-bottom: 16px;
  }

  .results-section {
    width: 100%;
    max-width: 720px;
    display: none;
  }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 2px;
  }

  .results-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .results-meta {
    font-size: 13px;
    color: var(--text3);
  }

  .results-meta span {
    color: var(--text2);
    font-weight: 500;
  }

  .path-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 20px 18px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.3s ease forwards;
    box-shadow: var(--shadow);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .path-index {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  .path-nodes {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .node {
    display: inline-flex;
    align-items: center;
    height: 34px;
    padding: 0 14px;
    background: var(--node-bg);
    border: 1px solid var(--node-border);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .node:hover {
    background: var(--surface2);
    border-color: var(--border2);
  }

  .node.start, .node.end {
    background: var(--text);
    border-color: transparent;
    color: var(--bg);
    font-weight: 500;
  }

  .node.end {
    background: var(--end-bg);
    border-color: var(--end-border);
    color: var(--end-color);
  }

  .node-arrow {
    color: var(--text3);
    font-size: 14px;
    flex-shrink: 0;
  }

  .hop-badge {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 10px;
    background: var(--accent-subtle);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    margin-left: 4px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .stat-val.accent { color: var(--accent); }

  .stat-label {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .stat-divider {
    width: 1px;
    height: 36px;
    background: var(--border2);
  }

  @media (max-width: 600px) {
    .inputs-row { grid-template-columns: 1fr; }
    .arrow-divider { transform: rotate(90deg); margin: -4px auto; }
    .arrow-divider svg { margin-top: 0; }
    h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">WikiRunner</div>
  <p class="tagline">Shortest route between any two Wikipedia articles.</p>
</header>

<div class="card">
  <div class="inputs-row">
    <div class="input-wrap">
      <span class="input-label">From</span>
      <div class="input-field">
        <input type="text" id="from-input" placeholder="e.g. Light_therapy" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="arrow-divider">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10h12M12 5l5 5-5 5"/>
      </svg>
    </div>
    <div class="input-wrap">
      <span class="input-label">To</span>
      <div class="input-field">
        <input type="text" id="to-input" placeholder="e.g. Glock" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
  <button class="btn-run" id="run-btn">
    <div class="spinner"></div>
    <span class="btn-text">Find Path</span>
  </button>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="results-section" id="results-section">
  <div class="summary-card" id="summary-card"></div>
  <div class="results-header">
    <span class="results-title">Paths found</span>
    <span class="results-meta" id="results-meta"></span>
  </div>
  <div id="paths-container"></div>
</div>

<script>
const API = '/api';
document.getElementById('run-btn').addEventListener('click', run);
document.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

function toWikiTitle(s) {
  return s.trim().replace(/ /g, '_');
}

async function run() {
  const from = toWikiTitle(document.getElementById('from-input').value);
  const to = toWikiTitle(document.getElementById('to-input').value);
  const btn = document.getElementById('run-btn');
  const errEl = document.getElementById('error-msg');
  const resultsSection = document.getElementById('results-section');

  if (!from || !to) return;

  btn.classList.add('loading');
  btn.disabled = true;
  errEl.style.display = 'none';
  resultsSection.style.display = 'none';

  const url = `${API}/path?from=${from}&to=${to}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok || data.error) {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      return;
    }

    renderResults(data);
  } catch (e) {
    errEl.innerHTML = `Could not reach the API. <a href="${url}" target="_blank" style="color:inherit;text-decoration:underline">Try direct link</a>.`;
    errEl.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderResults(data) {
  const section = document.getElementById('results-section');
  const summary = document.getElementById('summary-card');
  const meta = document.getElementById('results-meta');
  const container = document.getElementById('paths-container');

  summary.innerHTML = `
    <div class="stat"><div class="stat-val accent">${data.hops}</div><div class="stat-label">${data.hops === 1 ? 'hop' : 'hops'}</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val">${data.paths_found}</div><div class="stat-label">${data.paths_found === 1 ? 'path' : 'paths'} found</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-val">${data.elapsed_s}s</div><div class="stat-label">elapsed</div></div>
  `;

  meta.innerHTML = `<span>${data.from}</span> → <span>${data.to}</span>`;

  container.innerHTML = data.paths.map((path, i) => {
    const nodes = path.map((node, j) => {
      const cls = j === 0 ? 'start' : j === path.length - 1 ? 'end' : '';
      const label = node.replace(/_/g, ' ');
      const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(node)}`;
      const arrow = j < path.length - 1 ? '<span class="node-arrow">→</span>' : '';
      return `<a class="node ${cls}" href="${wikiUrl}" target="_blank" rel="noopener">${label}</a>${arrow}`;
    }).join('');
    const delay = i * 60;
    return `
      <div class="path-card" style="animation-delay:${delay}ms">
        <div class="path-index">Path ${i + 1}</div>
        <div class="path-nodes">${nodes}</div>
      </div>`;
  }).join('');

  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
